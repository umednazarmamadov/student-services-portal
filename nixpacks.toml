[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "composer", "nodejs", "nodePackages.npm", "apacheHttpd"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm install"]
[phases.build]
cmds = ["npm run build", "php artisan config:cache", "php artisan route:cache"]
[start]
cmd = "php artisan migrate --force && apache2 -D FOREGROUND"
