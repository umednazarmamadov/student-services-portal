[phases.setup]
nixPkgs = ["php82", "php82Extentions.pdo", "php82Extentions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "composer"]
[phases.build]
cmds = ["composer install --no-dev", "php artisan config:cache", "php artisan route:cache"]
[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
