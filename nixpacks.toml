[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "composer"]
[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]
[phases.build]
cmds = ["php artisan config:cache", "php artisan route:cache"]
[start]
cmd = "php artisan migrate --force && php -S 0.0.0.0:8080 -t public"
